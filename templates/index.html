<!DOCTYPE html>
<html lang="ar" dir="rtl" id="htmlTag">
<head>
    <meta charset="UTF-8">
    <title>نظام تصنيف البلاغات الذكي</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        :root { --bg: #f4f7f6; --card-bg: white; --text: #333; --nav: #2c3e50; }
        .dark-mode { --bg: #1a1a1a; --card-bg: #2d2d2d; --text: #eee; --nav: #000; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--bg); color: var(--text); margin: 0; padding: 20px; transition: 0.3s; }
        .nav-bar { background: var(--nav); color: white; padding: 15px; border-radius: 10px; display: flex; justify-content: space-between; margin-bottom: 20px; align-items: center; }
        .page { display: none; background: var(--card-bg); padding: 30px; border-radius: 20px; box-shadow: 0 5px 15px rgba(0,0,0,0.1); }
        .active { display: block; }
        input, textarea, select { width: 100%; padding: 10px; margin: 10px 0; border-radius: 5px; border: 1px solid #ccc; background: var(--card-bg); color: var(--text); }
        button { background: #2ecc71; color: white; border: none; padding: 10px 20px; border-radius: 5px; cursor: pointer; }
        .dashboard-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin-top: 20px; }
        #chatBox { height: 300px; border: 1px solid #ccc; overflow-y: scroll; padding: 15px; margin-bottom: 10px; border-radius: 10px; background: #f9f9f9; color: #333; }
        .msg { margin-bottom: 10px; padding: 8px; border-radius: 10px; }
        .user-msg { background: #dcf8c6; text-align: left; }
        .ai-msg { background: #e1f5fe; text-align: right; }
    </style>
</head>
<body>

<div class="nav-bar">
    <div>📊 البلاغات الكلية: <span id="count">0</span></div>
    <div>
        <button onclick="toggleDarkMode()">🌙/☀️</button>
        <button onclick="showPage('home')">الرئيسية</button>
        <button onclick="showPage('dashboard')">التحليلات</button>
        <button onclick="showPage('chat')">شات ذكي</button>
        <button onclick="showPage('report')">تقديم بلاغ</button>
        <button onclick="showPage('logs')">السجلات</button>
    </div>
</div>

<div id="home" class="page active">
    <h1>نظام تصنيف البلاغات الذكي</h1>
    <p>أرسل بلاغك ليقوم النظام بتصنيفه وحفظه في السجلات السحابية.</p>
</div>

<div id="dashboard" class="page">
    <h2>لوحة مراقبة البيانات</h2>
    <select id="timeFilter" onchange="updateCharts()">
        <option value="day">اليوم</option>
        <option value="week">الأسبوع</option>
        <option value="month">الشهر</option>
        <option value="year">السنة</option>
    </select>
    <h3>إجمالي البلاغات: <span id="totalReports">0</span></h3>
    <div class="dashboard-grid">
        <canvas id="categoryChart"></canvas>
        <canvas id="timeChart"></canvas>
    </div>
</div>

<div id="chat" class="page">
    <h2>مساعدك الذكي</h2>
    <div id="chatBox"><div class="msg ai-msg">مرحباً! كيف أساعدك اليوم؟</div></div>
    <input type="text" id="userInput" placeholder="اكتب سؤالك هنا...">
    <button onclick="sendMessage()">إرسال</button>
</div>

<div id="report" class="page">
    <input type="text" id="name" placeholder="الاسم">
    <input type="tel" id="phone" placeholder="رقم الهاتف">
    <textarea id="desc" placeholder="تفاصيل البلاغ..."></textarea>
    <button onclick="classifyAndSubmit()">إرسال وتصنيف</button>
</div>

<div id="logs" class="page">
    <input type="tel" id="searchPhone" placeholder="رقم هاتفك">
    <button onclick="loadUserComplaints()">عرض السجلات</button>
    <table id="logsTable"><thead><tr><th>التاريخ</th><th>التفاصيل</th><th>التصنيف</th></tr></thead><tbody id="logsBody"></tbody></table>
</div>

<script>
    function showPage(pageId) {
        document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
        document.getElementById(pageId).classList.add('active');
    }

    function toggleDarkMode() { document.body.classList.toggle('dark-mode'); }

    // الشات الذكي (مربوط بسيرفرك)
    async function sendMessage() {
        const input = document.getElementById('userInput');
        const chatBox = document.getElementById('chatBox');
        if (!input.value) return;
        chatBox.innerHTML += `<div class="msg user-msg">أنت: ${input.value}</div>`;
        const userText = input.value; input.value = '';
        
        const response = await fetch('/chat', { method: 'POST', headers: {'Content-Type': 'application/json'}, body: JSON.stringify({ message: userText })});
        const data = await response.json();
        chatBox.innerHTML += `<div class="msg ai-msg">AI: ${data.reply}</div>`;
    }

    // تحديث البيانات الحقيقية للرسوم البيانية
    async function updateCharts() {
        const period = document.getElementById('timeFilter').value;
        const response = await fetch(`/api/stats?period=${period}`);
        const data = await response.json();
        document.getElementById('totalReports').innerText = data.total;
        // تحديث Charts.js هنا
    }

    async function classifyAndSubmit() {
        const name = document.getElementById('name').value;
        const phone = document.getElementById('phone').value;
        const text = document.getElementById('desc').value;
        const res = await fetch('/predict', { method: 'POST', headers: {'Content-Type': 'application/json'}, body: JSON.stringify({ name, phone, complaint: text })});
        const data = await res.json();
        alert("تم التصنيف: " + data.category);
    }
</script>
</body>
</html>
