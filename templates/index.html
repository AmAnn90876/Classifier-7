<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>نظام تصنيف البلاغات الذكي</title>
    <style>
        :root {
            --bg: #f4f7f6; --card-bg: white; --text: #333; --nav: #2c3e50;
        }
        .dark-mode {
            --bg: #1a1a1a; --card-bg: #2d2d2d; --text: #eee; --nav: #000;
        }
        body { font-family: 'Segoe UI', sans-serif; background: var(--bg); color: var(--text); margin: 0; padding: 20px; transition: 0.3s; }
        .nav-bar { background: var(--nav); color: white; padding: 15px; border-radius: 10px; display: flex; justify-content: space-between; margin-bottom: 20px; align-items: center; }
        .page { display: none; background: var(--card-bg); padding: 30px; border-radius: 20px; box-shadow: 0 5px 15px rgba(0,0,0,0.1); }
        .active { display: block; }
        input, textarea { width: 100%; padding: 10px; margin: 10px 0; border-radius: 5px; border: 1px solid #ccc; background: var(--card-bg); color: var(--text); }
        button { background: #2ecc71; color: white; border: none; padding: 10px 20px; border-radius: 5px; cursor: pointer; }
        .btn-search { background: #3498db; }
        .btn-export { background: #e67e22; margin-top: 10px; }
        table { width: 100%; border-collapse: collapse; margin-top: 20px; color: var(--text); }
        th, td { border: 1px solid #555; padding: 12px; text-align: right; }
        th { background: #f8f9fa; color: #333; }
        .search-container { display: flex; gap: 10px; margin-bottom: 20px; }
        .search-container input { margin: 0; }
    </style>
</head>
<body>

<div class="nav-bar">
    <div>📊 البلاغات المسترجعة: <span id="count">0</span></div>
    <div>
        <button onclick="toggleDarkMode()">🌙/☀️</button>
        <button onclick="showPage('home')">الرئيسية</button>
        <button onclick="showPage('report')">تقديم بلاغ</button>
        <button onclick="showPage('logs')">السجلات</button>
    </div>
</div>

<div id="home" class="page active">
    <h1>نظام تصنيف البلاغات الذكي</h1>
    <p>أرسل بلاغك ليقوم النظام بتصنيفه وحفظه في السجلات السحابية والمحلية.</p>
</div>

<div id="report" class="page">
    <h2>تقديم بلاغ جديد</h2>
    <input type="text" id="name" placeholder="اسم مقدم البلاغ">
    <input type="tel" id="phone" placeholder="رقم الهاتف (مثال: 05xxxxxxxx)" required>
    <textarea id="desc" placeholder="تفاصيل البلاغ..."></textarea>
    <label>إرفاق صورة للحالة (اختياري):</label>
    <input type="file" id="imageInput" accept="image/*">
    <button onclick="classifyAndSubmit()">إرسال وتصنيف</button>
</div>

<div id="logs" class="page">
    <h2>سجل البلاغات الخاصة بك</h2>
    <div class="search-container">
        <input type="tel" id="searchPhone" placeholder="أدخل رقم هاتفك لعرض بلاغاتك">
        <button class="btn-search" onclick="loadUserComplaints()">عرض السجل</button>
    </div>
    <button class="btn-export" onclick="exportToCSV()">تصدير البلاغات الحالية إلى CSV</button>

    <table>
        <thead>
            <tr>
                <th>التاريخ</th>
                <th>التفاصيل</th>
                <th>التصنيف</th>
                <th>الثقة</th>
            </tr>
        </thead>
        <tbody id="logsBody">
            <tr><td colspan="4" style="text-align: center; color: #7f8c8d;">يرجى البحث برقم الهاتف لعرض البلاغات.</td></tr>
        </tbody>
    </table>
</div>

<script>
    function showPage(pageId) {
        document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
        document.getElementById(pageId).classList.add('active');
    }

    function toggleDarkMode() {
        document.body.classList.toggle('dark-mode');
    }

    async function classifyAndSubmit() {
        const name = document.getElementById('name').value.trim();
        const phone = document.getElementById('phone').value.trim();
        const text = document.getElementById('desc').value;
        
        if (!name || !phone || !text) { alert("يرجى تعبئة الحقول المطلوبة"); return; }
        sendData(name, phone, text);
    }

    async function sendData(name, phone, text) {
        try {
            const response = await fetch('/predict', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ complaint: text, name, phone })
            });
            const data = await response.json();
            
            // حفظ محلي إضافي
            let localReports = JSON.parse(localStorage.getItem('my_reports') || '[]');
            localReports.push({ name, phone, text, category: data.category, timestamp: new Date().toLocaleString() });
            localStorage.setItem('my_reports', JSON.stringify(localReports));

            alert("تم التصنيف بنجاح: " + data.category);
            document.getElementById('searchPhone').value = phone;
            showPage('logs');
            loadUserComplaints();
        } catch (e) { alert("فشل الاتصال"); }
    }

    async function loadUserComplaints() {
        const phone = document.getElementById('searchPhone').value.trim();
        if (!phone) { alert("أدخل رقم الهاتف"); return; }

        const logsBody = document.getElementById('logsBody');
        try {
            const response = await fetch(`/api/complaints?phone=${phone}`);
            const complaints = await response.json();
            logsBody.innerHTML = '';
            complaints.forEach(c => {
                logsBody.innerHTML += `<tr><td>${c.timestamp}</td><td>${c.text}</td><td>${c.category}</td><td>${c.confidence}</td></tr>`;
            });
            document.getElementById('count').innerText = complaints.length;
        } catch (e) { logsBody.innerHTML = '<tr><td colspan="4">خطأ في جلب البيانات</td></tr>'; }
    }

    function exportToCSV() {
        const rows = Array.from(document.querySelectorAll('#logsBody tr'));
        let csvContent = "data:text/csv;charset=utf-8,التاريخ,التفاصيل,التصنيف,الثقة\n";
        rows.forEach(row => {
            const cols = Array.from(row.querySelectorAll('td')).map(td => td.innerText);
            csvContent += cols.join(",") + "\n";
        });
        const encodedUri = encodeURI(csvContent);
        const link = document.createElement("a");
        link.setAttribute("href", encodedUri);
        link.setAttribute("download", "my_reports.csv");
        document.body.appendChild(link);
        link.click();
    }
</script>
</body>
</html>
