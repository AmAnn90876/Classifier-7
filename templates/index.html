<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>نظام تصنيف البلاغات الذكي</title>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background: #f4f7f6; margin: 0; padding: 20px; }
        .nav-bar { background: #2c3e50; color: white; padding: 15px; border-radius: 10px; display: flex; justify-content: space-between; margin-bottom: 20px; align-items: center; }
        .page { display: none; background: white; padding: 30px; border-radius: 20px; box-shadow: 0 5px 15px rgba(0,0,0,0.1); }
        .active { display: block; }
        input, textarea { width: 100%; padding: 10px; margin: 10px 0; border-radius: 5px; border: 1px solid #ccc; box-sizing: border-box; }
        button { background: #2ecc71; color: white; border: none; padding: 10px 20px; border-radius: 5px; cursor: pointer; }
        .btn-search { background: #3498db; }
        table { width: 100%; border-collapse: collapse; margin-top: 20px; }
        th, td { border: 1px solid #ddd; padding: 12px; text-align: right; }
        th { background: #f8f9fa; }
        .search-container { display: flex; gap: 10px; margin-bottom: 20px; }
        .search-container input { margin: 0; }
    </style>
</head>
<body>

<div class="nav-bar">
    <div>📊 البلاغات المسترجعة: <span id="count">0</span></div>
    <div>
        <button onclick="showPage('home')">الرئيسية</button>
        <button onclick="showPage('report')">تقديم بلاغ</button>
        <button onclick="showPage('logs')">السجلات</button>
    </div>
</div>

<div id="home" class="page active">
    <h1>نظام تصنيف البلاغات الذكي</h1>
    <p>أرسل بلاغك ليقوم النظام بتصنيفه وحفظه في السجلات السحابية.</p>
</div>

<div id="report" class="page">
    <h2>تقديم بلاغ جديد</h2>
    <input type="text" id="name" placeholder="اسم مقدم البلاغ">
    <input type="tel" id="phone" placeholder="رقم الهاتف (مثال: 05xxxxxxxx)" required>
    <textarea id="desc" placeholder="تفاصيل البلاغ..."></textarea>
    
    <!-- حقل اختيار الصورة (اختياري) -->
    <label>إرفاق صورة للحالة (اختياري):</label>
    <input type="file" id="imageInput" accept="image/*">
    <button onclick="classifyAndSubmit()">إرسال وتصنيف</button>
</div>

<div id="logs" class="page">
    <h2>سجل البلاغات الخاصة بك</h2>
    
    <!-- محرك البحث برقم الهاتف للاستعراض الشخصي -->
    <div class="search-container">
        <input type="tel" id="searchPhone" placeholder="أدخل رقم هاتفك لعرض بلاغاتك السابقة فقط">
        <button class="btn-search" onclick="loadUserComplaints()">عرض السجل</button>
    </div>

    <table>
        <thead>
            <tr>
                <th>التاريخ والوقت</th>
                <th>تفاصيل البلاغ</th>
                <th>التصنيف المتوقع</th>
                <th>نسبة التأكيد</th>
            </tr>
        </thead>
        <tbody id="logsBody">
            <tr>
                <td colspan="4" style="text-align: center; color: #7f8c8d;">يرجى إدخال رقم هاتفك بالأعلى للبحث عن سجل بلاغاتك.</td>
            </tr>
        </tbody>
    </table>
</div>

<script>
    function showPage(pageId) {
        document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
        document.getElementById(pageId).classList.add('active');
    }

    async function classifyAndSubmit() {
        const name = document.getElementById('name').value.strip ? document.getElementById('name').value.trim() : document.getElementById('name').value;
        const phone = document.getElementById('phone').value.trim ? document.getElementById('phone').value.trim() : document.getElementById('phone').value;
        const text = document.getElementById('desc').value;
        
        if (!name || !phone || !text) { 
            alert("يرجى تعبئة الاسم، رقم الهاتف، وتفاصيل البلاغ"); 
            return; 
        }

        // إرسال البيانات مباشرة مع رقم الهاتف
        sendData(name, phone, text);
    }

    async function sendData(name, phone, text) {
        try {
            const response = await fetch('/predict', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ 
                    complaint: text,
                    name: name,
                    phone: phone
                })
            });
            const data = await response.json();
            
            if (data.error) {
                alert("خطأ من السيرفر: " + data.error);
                return;
            }

            const category = data.category || "غير معروف";
            alert("تم التصنيف بنجاح تحت قسم: " + category);
            
            // تنظيف الحقول بعد الإرسال
            document.getElementById('name').value = '';
            document.getElementById('phone').value = '';
            document.getElementById('desc').value = '';
            document.getElementById('imageInput').value = '';

            // تحويل المستخدم تلقائياً لصفحة السجلات وتعبئة رقم هاتفه فيها لعرض بلاغه الجديد فوراً
            document.getElementById('searchPhone').value = phone;
            showPage('logs');
            loadUserComplaints();
            
        } catch (error) {
            alert("فشل الاتصال بالسيرفر، تأكد من تشغيل المشروع على Render");
        }
    }

    // دالة جلب بلاغات مستخدم معين بناءً على رقم هاتفه
    async function loadUserComplaints() {
        const phone = document.getElementById('searchPhone').value.trim ? document.getElementById('searchPhone').value.trim() : document.getElementById('searchPhone').value;
        if (!phone) {
            alert("يرجى كتابة رقم الهاتف للبحث عن السجل");
            return;
        }

        const logsBody = document.getElementById('logsBody');
        logsBody.innerHTML = '<tr><td colspan="4" style="text-align: center;">جاري جلب السجلات...</td></tr>';

        try {
            // استدعاء الـ API مع بارامتر رقم الهاتف للفلترة المباشرة
            const response = await fetch(`/api/complaints?phone=${phone}`);
            const complaints = await response.json();

            if (response.status !== 200 || complaints.error) {
                logsBody.innerHTML = '<tr><td colspan="4" style="text-align: center; color: red;">فشل استرجاع البيانات</td></tr>';
                return;
            }

            document.getElementById('count').innerText = complaints.length;
            logsBody.innerHTML = ''; // تفريغ الجدول تمهيداً لعرض النتائج

            if (complaints.length === 0) {
                logsBody.innerHTML = '<tr><td colspan="4" style="text-align: center;">لا توجد بلاغات سابقة مسجلة برقم الهاتف هذا.</td></tr>';
                return;
            }

            // تعبئة البيانات الواردة من السيرفر
            complaints.forEach(c => {
                const row = `<tr>
                    <td>${c.timestamp}</td>
                    <td>${c.text}</td>
                    <td><strong style="color: #2e7d32;">${c.category}</strong></td>
                    <td>${c.confidence}</td>
                </tr>`;
                logsBody.innerHTML += row;
            });

        } catch (error) {
            logsBody.innerHTML = '<tr><td colspan="4" style="text-align: center; color: red;">حدث خطأ في الاتصال بقاعدة البيانات</td></tr>';
        }
    }
</script>
</body>
</html>
