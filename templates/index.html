<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <style>
        body { font-family: 'Segoe UI', sans-serif; background: #f4f7f6; margin: 0; padding: 20px; }
        .nav-bar { background: #2c3e50; color: white; padding: 15px; border-radius: 10px; display: flex; justify-content: space-between; margin-bottom: 20px; align-items: center; }
        .page { display: none; background: white; padding: 30px; border-radius: 20px; box-shadow: 0 5px 15px rgba(0,0,0,0.1); }
        .active { display: block; }
        input, textarea { width: 100%; padding: 10px; margin: 10px 0; border-radius: 5px; border: 1px solid #ccc; box-sizing: border-box; }
        button { background: #2ecc71; color: white; border: none; padding: 10px 20px; border-radius: 5px; cursor: pointer; }
        table { width: 100%; border-collapse: collapse; margin-top: 20px; }
        th, td { border: 1px solid #ddd; padding: 12px; text-align: right; }
        th { background: #f8f9fa; }
        .img-preview { width: 50px; height: 50px; object-fit: cover; border-radius: 5px; }
    </style>
</head>
<body>

<div class="nav-bar">
    <div>📊 البلاغات: <span id="count">0</span></div>
    <div>
        <button onclick="showPage('home')">الرئيسية</button>
        <button onclick="showPage('report')">تقديم بلاغ</button>
        <button onclick="showPage('logs')">السجلات</button>
    </div>
</div>

<div id="home" class="page active">
    <h1>نظام تصنيف البلاغات الذكي</h1>
    <p>أرسل بلاغك ليقوم النظام بتصنيفه وحفظه في السجلات.</p>
</div>

<div id="report" class="page">
    <h2>تقديم بلاغ جديد</h2>
    <input type="text" id="name" placeholder="اسم مقدم البلاغ">
    <textarea id="desc" placeholder="تفاصيل البلاغ..."></textarea>
    <!-- حقل اختيار الصورة -->
    <label>إرفاق صورة للحالة (اختياري):</label>
    <input type="file" id="imageInput" accept="image/*">
    <button onclick="classifyAndSubmit()">إرسال وتصنيف</button>
</div>

<div id="logs" class="page">
    <h2>سجل البلاغات</h2>
    <table>
        <thead><tr><th>الاسم</th><th>التفاصيل</th><th>الصورة</th><th>التصنيف</th></tr></thead>
        <tbody id="logsBody"></tbody>
    </table>
</div>

<script>
    let reports = [];

    function showPage(pageId) {
        document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
        document.getElementById(pageId).classList.add('active');
    }

    async function classifyAndSubmit() {
        const name = document.getElementById('name').value;
        const text = document.getElementById('desc').value;
        const fileInput = document.getElementById('imageInput');
        
        if (!name || !text) { alert("يرجى تعبئة البيانات"); return; }

        // تحويل الصورة إلى base64 لعرضها في الجدول
        let imageSrc = "";
        if (fileInput.files && fileInput.files[0]) {
            const reader = new FileReader();
            reader.onload = async function(e) {
                imageSrc = e.target.result;
                sendData(name, text, imageSrc);
            };
            reader.readAsDataURL(fileInput.files[0]);
        } else {
            sendData(name, text, null);
        }
    }

    async function sendData(name, text, imageSrc) {
        try {
            const response = await fetch('/predict', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ complaint: text })
            });
            const data = await response.json();
            const category = data.category || "غير معروف";

            reports.push({ name, desc: text, category, imageSrc });
            document.getElementById('count').innerText = reports.length;
            
            const imgCell = imageSrc ? `<img src="${imageSrc}" class="img-preview">` : "لا يوجد";
            const row = `<tr><td>${name}</td><td>${text}</td><td>${imgCell}</td><td>${category}</td></tr>`;
            document.getElementById('logsBody').innerHTML += row;
            
            alert("تم التصنيف والحفظ: " + category);
            document.getElementById('name').value = '';
            document.getElementById('desc').value = '';
            document.getElementById('imageInput').value = '';
            showPage('logs');
        } catch (error) {
            alert("فشل الاتصال بالسيرفر");
        }
    }
</script>
</body>
</html>
