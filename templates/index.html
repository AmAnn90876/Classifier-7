<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>نظام تصنيف البلاغات الاحترافي</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, sans-serif; background-color: #f4f7f6; margin: 0; padding: 20px; }
        .dashboard { max-width: 800px; margin: 0 auto; }
        
        /* تنسيق الإحصائيات */
        .stats-container { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin-bottom: 30px; }
        .card { background: white; padding: 20px; border-radius: 20px; box-shadow: 0 5px 15px rgba(0,0,0,0.05); text-align: center; }
        
        /* تنسيق لوحة الإدخال */
        .main-panel { background: white; padding: 30px; border-radius: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.08); text-align: center; }
        input, textarea { 
            width: 100%; padding: 12px; margin-bottom: 15px; 
            border: 2px solid #bdc3c7; border-radius: 8px; box-sizing: border-box; 
        }
        textarea { height: 120px; resize: none; }
        button { background-color: #2ecc71; color: white; border: none; padding: 12px 25px; border-radius: 8px; cursor: pointer; width: 100%; font-weight: bold; transition: 0.3s; }
        button:hover { background-color: #27ae60; }
        
        .result-box { margin-top: 25px; padding: 15px; border-radius: 8px; background-color: #e8f8f5; border: 1px solid #a3e4d7; display: none; text-align: right; }
    </style>
</head>
<body>

<div class="dashboard">
    <!-- الجزء العلوي: الإحصائيات -->
    <div class="stats-container">
        <div class="card">
            <div style="color: #7f8c8d;">عدد البلاغات</div>
            <div style="font-size: 24px; font-weight: bold;">12</div>
        </div>
        <div class="card">
            <div style="color: #7f8c8d;">الحالة النشطة</div>
            <div style="font-size: 24px; font-weight: bold; color: #2ecc71;">معالجة</div>
        </div>
    </div>

    <!-- لوحة الإدخال -->
    <div class="main-panel">
        <h2>نظام تصنيف البلاغات الذكي 🤖</h2>
        
        <input type="text" id="reporterName" placeholder="اسم مقدم البلاغ">
        <textarea id="complaintInput" placeholder="اكتب تفاصيل البلاغ هنا..."></textarea>
        
        <button onclick="classifyComplaint()">تصنيف البلاغ الحالي</button>

        <div class="result-box" id="resultBox">
            <div style="font-weight: bold; color: #16a085;">التصنيف المتوقع:</div>
            <div id="predictionResult" style="font-size: 18px; color: #2c3e50;">--</div>
        </div>
    </div>
</div>

<script>
    function classifyComplaint() {
        const name = document.getElementById('reporterName').value;
        const text = document.getElementById('complaintInput').value;
        const resultBox = document.getElementById('resultBox');
        const predictionResult = document.getElementById('predictionResult');

        if (!text.trim() || !name.trim()) { 
            alert('الرجاء تعبئة اسم مقدم البلاغ وتفاصيل الشكوى'); 
            return; 
        }

        fetch('/predict', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ name: name, complaint: text })
        })
        .then(response => response.json())
        .then(data => {
            if (data.category) {
                predictionResult.innerText = data.category;
                resultBox.style.display = 'block';
            } else {
                alert('خطأ في التصنيف');
            }
        })
        .catch(error => { console.error('Error:', error); alert('فشل الاتصال بالسيرفر'); });
    }
</script>

</body>
</html>
