<!DOCTYPE html>
<html lang="ar" dir="rtl" id="htmlTag">
<head>
    <meta charset="UTF-8">
    <title data-i18n="title">نظام تصنيف البلاغات الذكي</title>
    <style>
        :root { --bg: #f4f7f6; --card-bg: white; --text: #333; --nav: #2c3e50; }
        .dark-mode { --bg: #1a1a1a; --card-bg: #2d2d2d; --text: #eee; --nav: #000; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--bg); color: var(--text); margin: 0; padding: 20px; transition: 0.3s; }
        .nav-bar { background: var(--nav); color: white; padding: 15px; border-radius: 10px; display: flex; justify-content: space-between; margin-bottom: 20px; align-items: center; }
        .page { display: none; background: var(--card-bg); padding: 30px; border-radius: 20px; box-shadow: 0 5px 15px rgba(0,0,0,0.1); }
        .active { display: block; }
        input, textarea { width: 100%; padding: 10px; margin: 10px 0; border-radius: 5px; border: 1px solid #ccc; background: var(--card-bg); color: var(--text); }
        button { background: #2ecc71; color: white; border: none; padding: 10px 20px; border-radius: 5px; cursor: pointer; }
        .btn-search { background: #3498db; }
        .btn-lang { background: #9b59b6; }
        .btn-stats { background: #e67e22; } 
        .btn-export { background: #e67e22; margin-top: 10px; }
        table { width: 100%; border-collapse: collapse; margin-top: 20px; color: var(--text); }
        th, td { border: 1px solid #555; padding: 12px; text-align: right; }
        th { background: #f8f9fa; color: #333; }
        .search-container { display: flex; gap: 10px; margin-bottom: 20px; }
        /* تصميم الدوائر */
        .stats-container { display: flex; justify-content: center; gap: 20px; margin-top: 20px; }
        .circle-stat { width: 100px; height: 100px; border-radius: 50%; display: flex; flex-direction: column; align-items: center; justify-content: center; color: white; font-weight: bold; font-size: 14px; text-align: center; }
        /* نجوم التقييم */
        .stars { font-size: 24px; cursor: pointer; color: #ccc; display: inline-block; }
        
        /* تنسيق الشعار وتوسيطه */
        .logo-container { text-align: center; margin-bottom: 20px; }
        .logo-container img { max-width: 150px; height: auto; display: inline-block; }
    </style>
</head>
<body>

<!-- قسم الشعار المضاف في منتصف الصفحة بالأعلى -->
<div class="logo-container">
    <!-- استبدل هذا الرابط برابط صورتك أو الشعار الخاص بك -->
    <img src="https://via.placeholder.com/150x50?text=Logo" alt="الشعار">
</div>

<div class="nav-bar">
    <div>📊 <span data-i18n="reports_count">البلاغات المسترجعة</span>: <span id="count">0</span></div>
    <div>
        <button onclick="toggleDarkMode()">🌙/☀️</button>
        <button class="btn-lang" onclick="toggleLanguage()">EN/AR</button>
        <button class="btn-stats" onclick="window.open('https://my-app-git3kwfxmxclxvajrjmgbp.streamlit.app/', '_blank')" data-i18n="nav_stats">الإحصائيات</button>
        <button onclick="showPage('home')" data-i18n="nav_home">الرئيسية</button>
        <button onclick="showPage('report')" data-i18n="nav_report">تقديم بلاغ</button>
        <button onclick="showPage('logs')" data-i18n="nav_logs">السجلات</button>
    </div>
</div>

<div id="home" class="page active">
    <h1 data-i18n="home_title">نظام تصنيف البلاغات الذكي</h1>
    <div class="stats-container">
        <div class="circle-stat" style="background: #3498db;"><span>اليومي</span><span id="dailyCount">0</span></div>
        <div class="circle-stat" style="background: #2ecc71;"><span>الأسبوعي</span><span id="weeklyCount">0</span></div>
        <div class="circle-stat" style="background: #9b59b6;"><span>الشهري</span><span id="monthlyCount">0</span></div>
    </div>
    <p style="text-align:center; margin-top: 30px;" data-i18n="home_desc">أرسل بلاغك ليقوم النظام بتصنيفه وحفظه في السجلات السحابية.</p>
</div>

<div id="report" class="page">
    <h2 data-i18n="rep_title">تقديم بلاغ جديد</h2>
    <input type="text" id="name" placeholder="اسم مقدم البلاغ" data-i18n-placeholder="placeholder_name">
    <input type="tel" id="phone" placeholder="رقم الهاتف" data-i18n-placeholder="placeholder_phone">
    <textarea id="desc" placeholder="تفاصيل البلاغ..." data-i18n-placeholder="placeholder_desc"></textarea>
    
    <label>تقييم الخدمة:</label>
    <div id="ratingStars">
        <span class="stars" onclick="setRating(1)">★</span>
        <span class="stars" onclick="setRating(2)">★</span>
        <span class="stars" onclick="setRating(3)">★</span>
        <span class="stars" onclick="setRating(4)">★</span>
        <span class="stars" onclick="setRating(5)">★</span>
    </div>
    <input type="hidden" id="ratingValue" value="0">

    <label style="display:block; margin-top:10px;" data-i18n="label_img">إرفاق صورة (اختياري):</label>
    <input type="file" id="imageInput" accept="image/*">
    <button onclick="classifyAndSubmit()" data-i18n="btn_submit">إرسال وتصنيف</button>
</div>

<div id="logs" class="page">
    <h2 data-i18n="logs_title">سجل البلاغات الخاصة بك</h2>
    <div class="search-container">
        <input type="tel" id="searchPhone" placeholder="رقم هاتفك" data-i18n-placeholder="placeholder_search">
        <button class="btn-search" onclick="loadUserComplaints()" data-i18n="btn_search">عرض السجل</button>
    </div>
    <button class="btn-export" onclick="exportToCSV()" data-i18n="btn_export">تصدير إلى CSV</button>
    <table>
        <thead>
            <tr>
                <th data-i18n="th_date">التاريخ والوقت</th>
                <th data-i18n="th_desc">التفاصيل</th>
                <th data-i18n="th_cat">التصنيف</th>
                <th data-i18n="th_conf">الثقة</th>
            </tr>
        </thead>
        <tbody id="logsBody"></tbody>
    </table>
</div>

<script>
    let currentRating = 0;
    function setRating(val) {
        currentRating = val;
        document.getElementById('ratingValue').value = val;
        const stars = document.querySelectorAll('.stars');
        stars.forEach((s, i) => s.style.color = i < val ? '#f1c40f' : '#ccc');
    }

    const translations = {
        ar: { title: "نظام تصنيف البلاغات الذكي", nav_home: "الرئيسية", nav_report: "تقديم بلاغ", nav_logs: "السجلات", nav_stats: "الإحصائيات", reports_count: "البلاغات المسترجعة", home_title: "نظام تصنيف البلاغات الذكي", home_desc: "أرسل بلاغك ليقوم النظام بتصنيفه وحفظه في السجلات السحابية.", rep_title: "تقديم بلاغ جديد", placeholder_name: "اسم مقدم البلاغ", placeholder_phone: "رقم الهاتف", placeholder_desc: "تفاصيل البلاغ...", label_img: "إرفاق صورة (اختياري):", btn_submit: "إرسال وتصنيف", logs_title: "سجل البلاغات الخاصة بك", placeholder_search: "رقم هاتفك", btn_search: "عرض السجل", btn_export: "تصدير إلى CSV", th_date: "التاريخ والوقت", th_desc: "التفاصيل", th_cat: "التصنيف", th_conf: "الثقة" },
        en: { title: "Smart Complaint System", nav_home: "Home", nav_report: "Report", nav_logs: "Logs", nav_stats: "Stats", reports_count: "Complaints", home_title: "Smart Complaint System", home_desc: "Submit your complaint for classification.", rep_title: "New Report", placeholder_name: "Your Name", placeholder_phone: "Phone Number", placeholder_desc: "Details...", label_img: "Attach image (optional):", btn_submit: "Submit & Classify", logs_title: "My Logs", placeholder_search: "Your Phone", btn_search: "Search", btn_export: "Export to CSV", th_date: "Date & Time", th_desc: "Details", th_cat: "Category", th_conf: "Confidence" }
    };

    let currentLang = 'ar';
    function toggleLanguage() {
        currentLang = currentLang === 'ar' ? 'en' : 'ar';
        document.getElementById('htmlTag').lang = currentLang;
        document.getElementById('htmlTag').dir = currentLang === 'ar' ? 'rtl' : 'ltr';
        document.querySelectorAll('[data-i18n]').forEach(el => el.innerText = translations[currentLang][el.dataset.i18n]);
        document.querySelectorAll('[data-i18n-placeholder]').forEach(el => el.placeholder = translations[currentLang][el.dataset.i18nPlaceholder]);
    }

    function toggleDarkMode() { document.body.classList.toggle('dark-mode'); }
    function showPage(pageId) {
        document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
        document.getElementById(pageId).classList.add('active');
    }

    async function updateStats() {
        try {
            const response = await fetch('/api/stats-detailed');
            const data = await response.json();
            document.getElementById('dailyCount').innerText = data.daily;
            document.getElementById('weeklyCount').innerText = data.weekly;
            document.getElementById('monthlyCount').innerText = data.monthly;
        } catch (e) { console.log("تحميل الإحصائيات..."); }
    }

    window.onload = updateStats;

    async function classifyAndSubmit() {
        const name = document.getElementById('name').value.trim();
        const phone = document.getElementById('phone').value.trim();
        const text = document.getElementById('desc').value;
        const rating = document.getElementById('ratingValue').value;
        if (!name || !phone || !text) { alert("يرجى تعبئة البيانات"); return; }
        sendData(name, phone, text, rating);
    }

    async function sendData(name, phone, text, rating) {
        try {
            const response = await fetch('/predict', { method: 'POST', headers: {'Content-Type': 'application/json'}, body: JSON.stringify({ complaint: text, name, phone, rating }) });
            const data = await response.json();
            alert("تم التصنيف والتقييم بنجاح!");
            document.getElementById('searchPhone').value = phone;
            showPage('logs');
            loadUserComplaints();
            updateStats();
        } catch (e) { alert("خطأ في الاتصال"); }
    }

    async function loadUserComplaints() {
        const phone = document.getElementById('searchPhone').value.trim();
        const logsBody = document.getElementById('logsBody');
        try {
            const response = await fetch(`/api/complaints?phone=${phone}`);
            const complaints = await response.json();
            logsBody.innerHTML = '';
            complaints.forEach(c => logsBody.innerHTML += `<tr><td>${c.timestamp}</td><td>${c.text}</td><td>${c.category}</td><td>${c.confidence}</td></tr>`);
            document.getElementById('count').innerText = complaints.length;
        } catch (e) { logsBody.innerHTML = '<tr><td colspan="4">خطأ في جلب البيانات</td></tr>'; }
    }

    function exportToCSV() {
        let csvContent = "data:text/csv;charset=utf-8,التاريخ,التفاصيل,التصنيف,الثقة\n";
        Array.from(document.querySelectorAll('#logsBody tr')).forEach(row => {
            csvContent += Array.from(row.querySelectorAll('td')).map(td => td.innerText).join(",") + "\n";
        });
        const link = document.createElement("a");
        link.setAttribute("href", encodeURI(csvContent));
        link.setAttribute("download", "reports.csv");
        document.body.appendChild(link);
        link.click();
    }
</script>
</body>
</html>
