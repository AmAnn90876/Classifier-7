<!DOCTYPE html>
<html lang="ar" dir="rtl" id="htmlTag">
<head>
    <meta charset="UTF-8">
    <title data-i18n="title">نظام تصنيف البلاغات الذكي</title>
    <style>
        :root { --bg: #f4f7f6; --card-bg: white; --text: #333; --nav: #2c3e50; }
        .dark-mode { --bg: #1a1a1a; --card-bg: #2d2d2d; --text: #eee; --nav: #000; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--bg); color: var(--text); margin: 0; padding: 20px; transition: 0.3s; }
        .nav-bar { background: var(--nav); color: white; padding: 15px; border-radius: 10px; display: flex; justify-content: space-between; margin-bottom: 20px; align-items: center; }
        .page { display: none; background: var(--card-bg); padding: 30px; border-radius: 20px; box-shadow: 0 5px 15px rgba(0,0,0,0.1); }
        .active { display: block; }
        input, textarea { width: 100%; padding: 10px; margin: 10px 0; border-radius: 5px; border: 1px solid #ccc; background: var(--card-bg); color: var(--text); }
        button { background: #2ecc71; color: white; border: none; padding: 10px 20px; border-radius: 5px; cursor: pointer; }
        .btn-search { background: #3498db; }
        .btn-lang { background: #9b59b6; }
        .btn-stats { background: #e67e22; } 
        .btn-export { background: #e67e22; margin-top: 10px; }
        table { width: 100%; border-collapse: collapse; margin-top: 20px; color: var(--text); }
        th, td { border: 1px solid #555; padding: 12px; text-align: right; }
        th { background: #f8f9fa; color: #333; }
        .search-container { display: flex; gap: 10px; margin-bottom: 20px; }
        
        /* تصميم الدوائر الجديد */
        .main-circle-stat { width: 150px; height: 150px; border: 8px solid #e67e22; border-radius: 50%; display: flex; flex-direction: column; align-items: center; justify-content: center; margin: 20px auto; }
        .cat-circle { width: 120px; height: 120px; border: 6px solid #ccc; border-radius: 50%; display: flex; flex-direction: column; align-items: center; justify-content: center; margin: 20px auto; transition: 0.3s; }
        .color-btns { display: flex; justify-content: center; gap: 10px; margin-top: 10px; }
        .btn-cat { width: 40px; height: 40px; border-radius: 50%; border: none; cursor: pointer; }
        
        .stars { font-size: 24px; cursor: pointer; color: #ccc; display: inline-block; }
        .logo-container { text-align: center; margin-bottom: 20px; }
        .logo-container img { max-width: 150px; height: auto; }
    </style>
</head>
<body>

<div class="logo-container">
    <img src="https://pbs.twimg.com/profile_images/1866920620300075009/80lUQMl6.jpg" alt="الشعار">
</div>

<div class="nav-bar">
    <div>📊 <span data-i18n="reports_count">البلاغات المسترجعة</span>: <span id="count">0</span></div>
    <div>
        <button onclick="toggleDarkMode()">🌙/☀️</button>
        <button class="btn-lang" onclick="toggleLanguage()">EN/AR</button>
        <button class="btn-stats" onclick="window.open('https://my-app-git3kwfxmxclxvajrjmgbp.streamlit.app/', '_blank')" data-i18n="nav_stats">الإحصائيات</button>
        <button onclick="showPage('home')" data-i18n="nav_home">الرئيسية</button>
        <button onclick="showPage('report')" data-i18n="nav_report">تقديم بلاغ</button>
        <button onclick="showPage('logs')" data-i18n="nav_logs">السجلات</button>
    </div>
</div>

<div id="home" class="page active">
    <h1 data-i18n="home_title" style="text-align:center;">نظام تصنيف البلاغات الذكي</h1>
    
    <!-- الدائرة الرئيسية للوقت -->
    <div style="text-align: center;">
        <button onclick="updateMainStat('daily')">اليومي</button>
        <button onclick="updateMainStat('weekly')">الأسبوعي</button>
        <button onclick="updateMainStat('monthly')">الشهري</button>
        <div class="main-circle-stat">
            <span id="labelPeriod" style="font-weight:bold;">اليومي</span>
            <span id="valTotal" style="font-size:30px; color:#e67e22; font-weight:bold;">0</span>
        </div>
    </div>

    <hr>

    <!-- الدائرة التفاعلية للأقسام -->
    <h3 style="text-align:center;">إحصائيات الأقسام (اضغط اللون)</h3>
    <div class="cat-circle" id="catCircleDisplay">
        <span id="catName">اختر قسماً</span>
        <span id="catValue" style="font-size:24px; font-weight:bold;">0</span>
    </div>
    <div class="color-btns">
        <button class="btn-cat" style="background:#e74c3c" onclick="showCat('التقني', 45, '#e74c3c')"></button>
        <button class="btn-cat" style="background:#3498db" onclick="showCat('المالي', 28, '#3498db')"></button>
        <button class="btn-cat" style="background:#2ecc71" onclick="showCat('العام', 15, '#2ecc71')"></button>
    </div>
</div>

<div id="report" class="page">
    <h2 data-i18n="rep_title">تقديم بلاغ جديد</h2>
    <input type="text" id="name" placeholder="اسم مقدم البلاغ" data-i18n-placeholder="placeholder_name">
    <input type="tel" id="phone" placeholder="رقم الهاتف" data-i18n-placeholder="placeholder_phone">
    <textarea id="desc" placeholder="تفاصيل البلاغ..." data-i18n-placeholder="placeholder_desc"></textarea>
    
    
    <label style="display:block; margin-top:10px;" data-i18n="label_img">إرفاق صورة (اختياري):</label>
    <input type="file" id="imageInput" accept="image/*">
    <button onclick="classifyAndSubmit()" data-i18n="btn_submit">إرسال وتصنيف</button>
</div>
    
    <label>تقييم الخدمة:</label>
    <div id="ratingStars">
        <span class="stars" onclick="setRating(1)">★</span>
        <span class="stars" onclick="setRating(2)">★</span>
        <span class="stars" onclick="setRating(3)">★</span>
        <span class="stars" onclick="setRating(4)">★</span>
        <span class="stars" onclick="setRating(5)">★</span>
    </div>
    <input type="hidden" id="ratingValue" value="0">
    
<div id="logs" class="page">
    <h2 data-i18n="logs_title">سجل البلاغات الخاصة بك</h2>
    <div class="search-container">
        <input type="tel" id="searchPhone" placeholder="رقم هاتفك" data-i18n-placeholder="placeholder_search">
        <button class="btn-search" onclick="loadUserComplaints()" data-i18n="btn_search">عرض السجل</button>
    </div>
    <button class="btn-export" onclick="exportToCSV()" data-i18n="btn_export">تصدير إلى CSV</button>
    <table>
        <thead>
            <tr>
                <th data-i18n="th_date">التاريخ والوقت</th>
                <th data-i18n="th_desc">التفاصيل</th>
                <th data-i18n="th_cat">التصنيف</th>
                <th data-i18n="th_conf">الثقة</th>
            </tr>
        </thead>
        <tbody id="logsBody"></tbody>
    </table>
</div>

<script>
    // --- الدوال المدمجة ---
    function setRating(val) {
        document.getElementById('ratingValue').value = val;
        document.querySelectorAll('.stars').forEach((s, i) => s.style.color = i < val ? '#f1c40f' : '#ccc');
    }

    function updateMainStat(period) {
        const stats = { daily: 10, weekly: 50, monthly: 200 };
        document.getElementById('labelPeriod').innerText = period === 'daily' ? 'اليومي' : (period === 'weekly' ? 'الأسبوعي' : 'الشهري');
        document.getElementById('valTotal').innerText = stats[period];
    }

    function showCat(name, val, color) {
        const circle = document.getElementById('catCircleDisplay');
        document.getElementById('catName').innerText = name;
        document.getElementById('catValue').innerText = val;
        circle.style.borderColor = color;
        document.getElementById('catValue').style.color = color;
    }

    // --- بقية دوالك الأصلية (اللغة، البحث، الإرسال) ---
    const translations = {
        ar: { title: "نظام تصنيف البلاغات الذكي", nav_home: "الرئيسية", nav_report: "تقديم بلاغ", nav_logs: "السجلات", nav_stats: "الإحصائيات", reports_count: "البلاغات", home_title: "نظام تصنيف البلاغات", home_desc: "أرسل بلاغك ليقوم النظام بتصنيفه.", rep_title: "تقديم بلاغ جديد", placeholder_name: "اسم مقدم البلاغ", placeholder_phone: "رقم الهاتف", placeholder_desc: "تفاصيل البلاغ...", label_img: "إرفاق صورة (اختياري):", btn_submit: "إرسال وتصنيف", logs_title: "سجل البلاغات", placeholder_search: "رقم هاتفك", btn_search: "عرض السجل", btn_export: "تصدير إلى CSV", th_date: "التاريخ", th_desc: "التفاصيل", th_cat: "التصنيف", th_conf: "الثقة" },
        en: { title: "Smart Complaint System", nav_home: "Home", nav_report: "Report", nav_logs: "Logs", nav_stats: "Stats", reports_count: "Complaints", home_title: "Smart Complaint System", home_desc: "Submit your complaint.", rep_title: "New Report", placeholder_name: "Your Name", placeholder_phone: "Phone Number", placeholder_desc: "Details...", label_img: "Attach image:", btn_submit: "Submit", logs_title: "My Logs", placeholder_search: "Your Phone", btn_search: "Search", btn_export: "Export to CSV", th_date: "Date", th_desc: "Details", th_cat: "Category", th_conf: "Confidence" }
    };

    function toggleLanguage() {
        // ... (منطق اللغة الخاص بك)
    }

    function toggleDarkMode() { document.body.classList.toggle('dark-mode'); }
    function showPage(pageId) {
        document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
        document.getElementById(pageId).classList.add('active');
    }

    async function classifyAndSubmit() {
        const name = document.getElementById('name').value.trim();
        const phone = document.getElementById('phone').value.trim();
        const text = document.getElementById('desc').value;
        const rating = document.getElementById('ratingValue').value;
        if (!name || !phone || !text) { alert("يرجى تعبئة البيانات"); return; }
        // الإرسال للسيرفر
        alert("تم الإرسال والتقييم بنجاح!");
        showPage('logs');
    }

    function exportToCSV() { /* منطق التصدير الخاص بك */ }
</script>
</body>
</html>
