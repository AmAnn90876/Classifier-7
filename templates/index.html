<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>نظام تصنيف الشكاوى والتقارير</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #f4f7f6;
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }
        .container {
            background-color: #ffffff;
            padding: 30px;
            border-radius: 12px;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.1);
            width: 100%;
            max-width: 500px;
            text-align: center;
        }
        h2 {
            color: #2c3e50;
            margin-bottom: 20px;
        }
        textarea {
            width: 100%;
            height: 120px;
            padding: 12px;
            border: 2px solid #bdc3c7;
            border-radius: 8px;
            resize: none;
            font-size: 16px;
            box-sizing: border-box;
            margin-bottom: 20px;
        }
        textarea:focus {
            border-color: #3498db;
            outline: none;
        }
        button {
            background-color: #2ecc71;
            color: white;
            border: none;
            padding: 12px 25px;
            font-size: 16px;
            border-radius: 8px;
            cursor: pointer;
            width: 100%;
            font-weight: bold;
        }
        button:hover {
            background-color: #27ae60;
        }
        .result-box {
            margin-top: 25px;
            padding: 15px;
            border-radius: 8px;
            background-color: #e8f8f5;
            border: 1px solid #a3e4d7;
            display: none;
        }
        .result-title {
            font-weight: bold;
            color: #16a085;
            margin-bottom: 5px;
        }
        .result-value {
            font-size: 18px;
            color: #2c3e50;
            font-weight: bold;
        }
    </style>
</head>
<body>

<div class="container">
    <h2>نظام تصنيف البلاغات الذكي 🤖</h2>
    <p style="color: #7f8c8d; font-size: 14px;">أدخل نص الشكوى أو البلاغ ليقوم النموذج بتحديد التصنيف المناسب تلقائياً.</p>
    
    <textarea id="complaintInput" placeholder="اكتب تفاصيل البلاغ هنا..."></textarea>
    <button onclick="classifyComplaint()">تصنيف البلاغ الحالي</button>

    <div class="result-box" id="resultBox">
        <div class="result-title">التصنيف المتوقع بواسطة النموذج:</div>
        <div class="result-value" id="predictionResult">--</div>
    </div>
</div>

<script>
    function classifyComplaint() {
        const text = document.getElementById('complaintInput').value;
        const resultBox = document.getElementById('resultBox');
        const predictionResult = document.getElementById('predictionResult');

        if (!text.trim()) {
            alert('الرجاء كتابة نص الشكوى أولاً');
            return;
        }

        fetch('/predict', {
            method: 'POST',
            headers: {
                'Content-Type': 'application/json'
            },
            body: JSON.stringify({ complaint: text })
        })
        .then(response => response.json())
        .then(data => {
            if (data.category) {
                predictionResult.innerText = data.category;
                resultBox.style.display = 'block';
            } else if (data.error) {
                alert('خطأ من النموذج: ' + data.error);
            } else {
                alert('حدث خطأ غير متوقع أثناء التصنيف');
            }
        })
        .catch(error => {
            console.error('Error:', error);
            alert('فشل الاتصال بالسيرفر');
        });
    }
</script>

</body>
</html>
