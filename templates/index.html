<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <style>
        body { font-family: 'Segoe UI', sans-serif; background: #f4f7f6; margin: 0; padding: 20px; }
        .nav-bar { background: #2c3e50; color: white; padding: 15px; border-radius: 10px; display: flex; justify-content: space-between; margin-bottom: 20px; align-items: center; }
        .page { display: none; background: white; padding: 30px; border-radius: 20px; box-shadow: 0 5px 15px rgba(0,0,0,0.1); }
        .active { display: block; }
        input, textarea { width: 100%; padding: 10px; margin: 10px 0; border-radius: 5px; border: 1px solid #ccc; box-sizing: border-box; }
        button { background: #2ecc71; color: white; border: none; padding: 10px 20px; border-radius: 5px; cursor: pointer; }
        table { width: 100%; border-collapse: collapse; margin-top: 20px; }
        th, td { border: 1px solid #ddd; padding: 12px; text-align: right; }
        th { background: #f8f9fa; }
    </style>
</head>
<body>

<div class="nav-bar">
    <div>📊 البلاغات: <span id="count">0</span></div>
    <div>
        <button onclick="showPage('home')">الرئيسية</button>
        <button onclick="showPage('report')">تقديم بلاغ</button>
        <button onclick="showPage('logs')">السجلات</button>
    </div>
</div>

<!-- صفحة 1: الرئيسية -->
<div id="home" class="page active">
    <h1>مرحباً بك في نظام تصنيف البلاغات</h1>
    <p>هذا النظام يساعدك في إدارة وتصنيف البلاغات بكفاءة واحترافية.</p>
</div>

<!-- صفحة 2: تقديم بلاغ -->
<div id="report" class="page">
    <h2>تقديم بلاغ جديد</h2>
    <input type="text" id="name" placeholder="اسم مقدم البلاغ">
    <textarea id="desc" placeholder="تفاصيل البلاغ..."></textarea>
    <button onclick="submitReport()">إرسال البلاغ</button>
</div>

<!-- صفحة 3: السجلات -->
<div id="logs" class="page">
    <h2>سجل البلاغات</h2>
    <table>
        <thead>
            <tr>
                <th>الاسم</th>
                <th>التفاصيل</th>
            </tr>
        </thead>
        <tbody id="logsBody"></tbody>
    </table>
</div>

<script>
    let reports = [];

    function showPage(pageId) {
        document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
        document.getElementById(pageId).classList.add('active');
    }

    function submitReport() {
        const name = document.getElementById('name').value;
        const desc = document.getElementById('desc').value;
        
        if(name && desc) {
            reports.push({ name, desc });
            
            // تحديث العداد
            document.getElementById('count').innerText = reports.length;
            
            // تحديث جدول السجلات
            const row = `<tr><td>${name}</td><td>${desc}</td></tr>`;
            document.getElementById('logsBody').innerHTML += row;
            
            alert("تم إرسال البلاغ بنجاح!");
            document.getElementById('name').value = '';
            document.getElementById('desc').value = '';
            showPage('logs'); // الانتقال للسجلات لرؤية البلاغ
        } else {
            alert("يرجى تعبئة البيانات");
        }
    }
</script>
</body>
</html>
