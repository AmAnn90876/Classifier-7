<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>لوحة التحكم الشاملة</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
</head>
<body class="bg-light p-4">
    <div class="container bg-white p-4 shadow rounded">
        <h2>📊 لوحة تحكم البلاغات</h2>
        <h4 id="totalReports">إجمالي البلاغات: جاري التحميل...</h4>
        
        <table class="table table-hover mt-4">
            <thead class="table-dark">
                <tr>
                    <th>التاريخ</th>
                    <th>الاسم</th>
                    <th>الهاتف</th>
                    <th>نص الشكوى</th>
                    <th>التصنيف</th>
                </tr>
            </thead>
            <tbody id="adminTableBody">
                <!-- البيانات ستظهر هنا -->
            </tbody>
        </table>
    </div>

    <script>
        async function loadDashboard() {
            try {
                const response = await fetch('/api/dashboard-stats');
                const data = await response.json();
                
                if (data.error) throw new Error(data.error);

                // تحديث العدد الإجمالي
                document.getElementById('totalReports').innerText = "إجمالي البلاغات: " + data.total_reports;

                // تعبئة الجدول
                const tbody = document.getElementById('adminTableBody');
                tbody.innerHTML = data.recent_reports.map(r => `
                    <tr>
                        <td>${r.timestamp}</td>
                        <td>${r.name}</td>
                        <td>${r.phone}</td>
                        <td>${r.text}</td>
                        <td><span class="badge bg-info text-dark">${r.category}</span></td>
                    </tr>
                `).join('');
                
            } catch (e) {
                console.error("خطأ:", e);
                document.getElementById('totalReports').innerText = "حدث خطأ في جلب البيانات";
            }
        }

        // تحديث كل 10 ثواني
        setInterval(loadDashboard, 10000);
        loadDashboard();
    </script>
</body>
</html>
