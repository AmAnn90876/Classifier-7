<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>لوحة تحكم الإدارة</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
    <style>
        body { background-color: #f8f9fa; padding: 20px; }
        .dashboard-container { background: white; padding: 25px; border-radius: 15px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
        .back-btn { margin-bottom: 20px; }
    </style>
</head>
<body>

<div class="container">
    <button class="btn btn-secondary back-btn" onclick="window.location.href='/'">← العودة للرئيسية</button>
    
    <div class="dashboard-container">
        <h2 class="mb-4">📊 لوحة تحكم البلاغات المباشرة</h2>
        <table class="table table-hover">
            <thead class="table-dark">
                <tr>
                    <th>التاريخ</th>
                    <th>الاسم</th>
                    <th>الهاتف</th>
                    <th>نص الشكوى</th>
                    <th>التصنيف</th>
                    <th>الثقة</th>
                </tr>
            </thead>
            <tbody id="adminTableBody">
                <!-- البيانات ستظهر هنا تلقائياً -->
            </tbody>
        </table>
    </div>
</div>

<script>
    async function fetchAllComplaints() {
        try {
            const response = await fetch('/api/complaints');
            const data = await response.json();
            const tbody = document.getElementById('adminTableBody');
            
            tbody.innerHTML = data.map(c => `
                <tr>
                    <td>${c.timestamp}</td>
                    <td>${c.name}</td>
                    <td>${c.phone}</td>
                    <td>${c.text}</td>
                    <td><span class="badge bg-primary">${c.category}</span></td>
                    <td>${(c.confidence * 100).toFixed(1)}%</td>
                </tr>
            `).join('');
        } catch (e) {
            console.error("خطأ في جلب البيانات:", e);
        }
    }

    // تحديث البيانات كل 5 ثواني
    setInterval(fetchAllComplaints, 5000);
    fetchAllComplaints();
</script>
</body>
</html>
